<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Avaliações</title>
  <link th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
  <link th:href="@{/css/styla.css}" rel="stylesheet">

</head>

<body>

  <nav class="cabecalhos navbar navbar-expand-sm">

    <div class="container">
      <ul class="navbar-nav">
        <li class="nav-item">
          <h1>Scolaris</h1>
        </li>
        <li class="nav-item m-2 mt-1">
          <a class="nav-link" th:href="@{|/turmasAlunos/${aluno}|}">Turmas</a>
        </li>
        <li class="nav-item m-2 mt-1">
          <a class="nav-link btn btn-danger" th:href="@{/}">Sair</a>
        </li>
      </ul>

    </div>
  </nav>




  <div class="container mt-5">
    <table id="tabelaAvals" class="table">
      <thead>
      <tr>
        <th>Id</th>
        <th>Título</th>
        <th>Descrição</th>
        <th>Valor</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
    </table>
  </div>


  <div class="modal" id="myModal">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <!-- Modal Header -->
        <div class="modal-header">
          <h4 class="modal-title">Deletar Turma?</h4>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <!-- Modal body -->
        <div class="modal-body" id="modalBody">
          <h1><b>Título:</b></h1>
            <h1 id="tituloAval"></h1>
            <h3><b>Descrição:</b></h3>
            <h3 id="descricaoAval"></h3>
            <h3><b>Nota máxima:</b></h3>
            <h3 id="valorTotal"></h3>
            <h3><b>Sua nota:</b></h3>
            <h3 id="notaAval"></h3>
            <h3><b>Recado do professor:</b></h3>
            <h3 id="recadoAval"></h3>
        </div>

        <!-- Modal footer -->
        <div class="modal-footer justify-content-between">

          <button type="button" class="btn btn-warning" id="botaoDeletarModal">Fechar</button>

        </div>

      </div>
    </div>
  </div>

  <input type="hidden" id="alunoId" th:value="${aluno}">
  <input type="hidden" id="turmaId" th:value="${turma}">

  <script th:src="@{/js/jquery.js}"></script>
  <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
  <script th:src="@{/js/avalsAlunos.js}"></script>
</body>

</html>
