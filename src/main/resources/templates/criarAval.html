<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Criar avaliação</title>
    <link th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/styla.css}" rel="stylesheet">

</head>

<body>

    <nav class="cabecalhos navbar navbar-expand-sm">

        <div class="container">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <h1>Scolaris</h1>
                </li>
                <li class="nav-item m-2 mt-1">
                    <a class="nav-link" th:href="@{|/turmasProfessor/${professor}|}">Turmas</a>
                </li>
                <li class="nav-item m-2 mt-1">
                    <a class="nav-link btn btn-danger" th:href="@{/}">Sair</a>
                </li>
            </ul>

        </div>
    </nav>




    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form id="formAval">
                    <div class="card">
                        <div class="topos card-header">
                            <h1>Criar Avaliação</h1>
                        </div>

                        <div class="card-body">
                            <label for="titulo">Título</label>
                            <input type="text" class="form-control" id="titulo" required>

                            <label for="descricaoAval">Descrição</label>
                            <textarea class="form-control" id="descricaoAval"required></textarea>


                            <div class="col-4">
                                <label for="valor">Valor</label>
                                <input type="number" class="form-control" id="valor" required>
                            </div>

                        </div>
                        <div class="card-footer">
                            <div class="row">
                                <div class="col-10"></div>
                                <div class="col-2"><button class="btn btn-success btn-block">Salvar</button></div>

                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <input type="hidden" id="turmaId" th:value="${turma}">
    <input type="hidden" id="profId" th:value="${professor}">


    <script th:src="@{/js/jquery.js}"></script>
    <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
    <script th:src="@{/js/criarAval.js}"></script>
</body>

</html>
