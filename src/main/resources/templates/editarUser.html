<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Criar usuário</title>
    <link th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/styla.css}" rel="stylesheet">

</head>

<body>

    <nav class="cabecalhos navbar navbar-expand-sm">

        <div class="container">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <h1>Scolaris</h1>
                </li>
                <li class="nav-item m-2 mt-1">
                    <a class="nav-link" th:href="@{/turmasDiretor}">Turmas</a>
                </li>
                <li class="nav-item m-2 mt-1">
                    <a class="nav-link" th:href="@{/verUsers}">Usuários</a>
                </li>
                <li class="nav-item m-2 mt-1">
                    <a class="nav-link btn btn-danger" th:href="@{/}">Sair</a>
                </li>
            </ul>

        </div>
    </nav>




    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form id="formUser">
                    <div class="card">
                        <div class="topos card-header">
                            <h1>Editar Usuário</h1>
                        </div>

                        <div class="card-body">
                            <label for="nome">Nome</label>
                            <input type="text" class="form-control" id="nome" th:value="${user.nome}" required>

                            <label for="user">Usuário</label>
                            <input type="text" class="form-control" id="usuario" th:value="${user.usuario}" required>

                            <label for="senha">Senha</label>
                            <input type="password" class="form-control" id="senha" required>
                            <input type="hidden" id="userId" th:value="${user.id}">
                            <input type="hidden" id="userTipo" th:value="${user.tipo}">

                        </div>
                        <div class="card-footer">
                            <div class="row">
                                <div class="col-10"></div>
                                <div class="col-2"><button class="btn btn-success btn-block">Salvar</button></div>

                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{/js/jquery.js}"></script>
    <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
    <script th:src="@{/js/editarUser.js}"></script>
</body>

</html>
