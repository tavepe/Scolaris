<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Usuários</title>
  <link th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
  <link th:href="@{/css/styla.css}" rel="stylesheet">

</head>

<body>

  <nav class="cabecalhos navbar navbar-expand-sm">

    <div class="container">
      <ul class="navbar-nav">
        <li class="nav-item">
          <h1>Scolaris</h1>
        </li>
        <li class="nav-item m-2 mt-1">
          <a class="nav-link" th:href="@{/turmasDiretor}">Turmas</a>
        </li>
        <li class="nav-item m-2 mt-1">
          <a class="nav-link" th:href="@{/verUsers}">Usuários</a>
        </li>
        <li class="nav-item m-2 mt-1">
          <a class="nav-link btn btn-danger" th:href="@{/}">Sair</a>
      </li>
      </ul>

    </div>
  </nav>




  <div class="container mt-5">
    <table class="table" id="tabelaUsers">
      <thead>
      <tr>
        <th>Id</th>
        <th>Nome de exibição</th>
        <th>Tipo</th>
        <th>Usuário</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
    </table>
    <div class="row">
      <div class="col-10"></div>
      <div class="col-2"><a class="btn btn-success" th:href="@{/criarUser}">Criar usuário</a></div>
      
    </div>
  </div>

  <div class="modal" id="myModal">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <!-- Modal Header -->
        <div class="modal-header">
          <h4 class="modal-title">Deletar Turma?</h4>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <!-- Modal body -->
        <div class="modal-body" id="modalBody">
          Tem certeza que deseja deletar a turma de id
        </div>

        <!-- Modal footer -->
        <div class="modal-footer justify-content-between">

          <button type="button" class="btn btn-warning" data-bs-dismiss="modal" style="float: left;">Cancelar</button>
          <button type="button" class="btn btn-danger" id="botaoDeletarModal">Deletar</button>

        </div>

      </div>
    </div>
  </div>

  <script th:src="@{/js/jquery.js}"></script>
  <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
  <script th:src="@{/js/usersDiretora.js}"></script>
</body>

</html>
